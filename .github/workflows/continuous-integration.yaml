name: Continuous Integration
on:
  push:
  pull_request:
  release:
    types: [created]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [
          ubuntu-22.04,
          macos-14
        ]
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2
      with:
        node-version: '21.7'
        registry-url: 'https://registry.npmjs.org'
    - run: npm ci
    - run: npm run-script buildExpoDoctor
    - run: npm run-script buildLint
    - run: npm run-script buildTypeScript
    - uses: shivammathur/setup-php@v2
      with:
        php-version: 8.5
    - run: composer install
    - run: vendor/bin/psalm
  release:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: test
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
    - run: npm ci
    - run: npm run-script buildTypeScript
    - run: echo ${{ secrets.NPMRC }} > ${NPM_CONFIG_USERCONFIG}
    - run: "sed -i \"s/\\\"version\\\": \\\"0.0.0\\\",/\\\"version\\\": \\\"${GITHUB_REF/refs\\/tags\\/v/}\\\",/g\" package.json"
    - run: npm publish
